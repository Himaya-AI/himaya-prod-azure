name: Deploy — Production (main branch)

on:
  push:
    branches: [main]

env:
  AWS_REGION: uaenorth
  ECR_ACCOUNT: __AZURE_ACCT__
  CLUSTER: himaya
  CF_DIST: __AZURE_FD_PROFILE__
  API_URL: https://app.himaya.ai

jobs:
  deploy:
    name: Build & Deploy to ECS + CloudFront
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: uaenorth

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/himaya-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.API_URL }}
            BUILD_TS=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy frontend to ECS
        run: |
          aws ecs update-service \
            --cluster $CLUSTER \
            --service himaya-frontend \
            --force-new-deployment \
            --region $AWS_REGION > /dev/null
          echo "✓ Frontend ECS deploy triggered"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CF_DIST \
            --paths "/*" > /dev/null
          echo "✓ CloudFront cache invalidated"

      # ── Backend ───────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/himaya-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster $CLUSTER \
            --service himaya-backend \
            --force-new-deployment \
            --region $AWS_REGION > /dev/null
          echo "✓ Backend ECS deploy triggered"

      # ── Wait & smoke test ─────────────────────────────────────────────────
      - name: Wait for ECS to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services himaya-frontend himaya-backend \
            --region $AWS_REGION
          echo "✓ ECS services stable"

      - name: Post-deploy smoke test
        run: |
          echo "Checking API health..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://app.himaya.ai/health || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✓ API health check passed (HTTP $STATUS)"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy failed! Check ECS logs in uaenorth cluster: himaya"
