name: Deploy — Azure Production (main branch)

on:
  push:
    branches: [main]

env:
  AZURE_REGION: uaenorth
  RG: rg-himaya-prod
  ACR_NAME: himayaprodacr
  CONTAINER_APP_ENV: himaya-prod-env
  BACKEND_APP: himaya-prod-backend
  FRONTEND_APP: himaya-prod-frontend
  API_URL: https://app.himaya.ai
  DEEPSEEK_ENDPOINT: ${{ secrets.DEEPSEEK_ENDPOINT }}

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy to Azure Container Apps
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ACR login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/himaya-frontend:latest
            ${{ env.ACR_NAME }}.azurecr.io/himaya-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.API_URL }}
            BUILD_TS=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/himaya-backend:latest
            ${{ env.ACR_NAME }}.azurecr.io/himaya-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy backend to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RG }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/himaya-backend:${{ github.sha }} \
            --set-env-vars "DEEPSEEK_ENDPOINT=${{ env.DEEPSEEK_ENDPOINT }}"

      - name: Deploy frontend to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.FRONTEND_APP }} \
            --resource-group ${{ env.RG }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/himaya-frontend:${{ github.sha }}

      - name: Purge Azure Front Door cache
        run: |
          echo "Purging Front Door endpoint (manual step if configured)..."
          # az cdn endpoint purge --name frontend --profile-name himaya-prod-fd --resource-group ${{ env.RG }} --content-paths '/*'

      - name: Post-deploy smoke test
        run: |
          echo "Checking API health..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://app.himaya.ai/health || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Health check passed (HTTP $STATUS)"
