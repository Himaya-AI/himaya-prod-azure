<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://app.himaya.ai; script-src 'self' 'unsafe-inline' https://appsforoffice.microsoft.com https://ajax.aspnetcdn.com; style-src 'self' 'unsafe-inline'; img-src 'self' https://app.himaya.ai data:; connect-src 'self' https://app.himaya.ai https://appsforoffice.microsoft.com;"/>
<title>Helios Phish Reporter</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, Arial, sans-serif;
    background: #ffffff;
    color: #1a1a2e;
    font-size: 13px;
    line-height: 1.5;
  }
  .header {
    background: #0f172a;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 2px solid #2563eb;
  }
  .header img { height: 22px; }
  .header-text { color: #f8fafc; font-size: 13px; font-weight: 600; letter-spacing: 0.02em; }
  .header-sub { color: #94a3b8; font-size: 10px; font-weight: 400; margin-top: 1px; }
  .body { padding: 20px 16px; }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #64748b;
    margin-bottom: 8px;
  }
  .description {
    color: #475569;
    font-size: 12px;
    line-height: 1.6;
    margin-bottom: 20px;
    padding: 12px;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 4px;
  }
  .divider { border: none; border-top: 1px solid #e2e8f0; margin: 16px 0; }
  .btn-report {
    width: 100%;
    padding: 10px 16px;
    background: #dc2626;
    color: #ffffff;
    border: none;
    border-radius: 3px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: background 0.15s;
  }
  .btn-report:hover:not(:disabled) { background: #b91c1c; }
  .btn-report:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; }
  .btn-report.success { background: #15803d; }
  .status {
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 3px;
    font-size: 12px;
    display: none;
    border-left: 3px solid transparent;
  }
  .status.success {
    display: block;
    background: #f0fdf4;
    border-left-color: #16a34a;
    color: #15803d;
  }
  .status.error {
    display: block;
    background: #fef2f2;
    border-left-color: #dc2626;
    color: #b91c1c;
  }
  .status.warning {
    display: block;
    background: #fffbeb;
    border-left-color: #d97706;
    color: #92400e;
  }
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 10px 16px;
    background: #f8fafc;
    border-top: 1px solid #e2e8f0;
    font-size: 10px;
    color: #94a3b8;
    text-align: center;
  }
  .footer a { color: #3b82f6; text-decoration: none; }
</style>
</head>
<body>
<div class="header">
  <img src="https://app.himaya.ai/himaya-logo.png" alt="Helios"/>
  <div>
    <div class="header-text">Helios Phish Reporter</div>
    <div class="header-sub">Himaya Technologies</div>
  </div>
</div>
<div class="body">
  <div class="section-title">Report Suspicious Email</div>
  <div class="description">
    If this email appears to be a phishing attempt, social engineering, or business email compromise, submit it for analysis. It will be escalated to your security team immediately.
  </div>
  <button class="btn-report" id="reportBtn" disabled onclick="reportPhishing()">Report as Phishing</button>
  <div class="status" id="status"></div>
</div>
<div class="footer">
  Helios by <a href="https://app.himaya.ai" target="_blank">Himaya Technologies</a>
</div>

<script>
var HELIOS_API = 'https://app.himaya.ai';

function getKey() {
  try { return new URLSearchParams(window.location.search).get('key') || ''; }
  catch(e) { return ''; }
}

Office.onReady(function(info) {
  if (info.host === Office.HostType.Outlook) {
    var key = getKey();
    if (!key) {
      var status = document.getElementById('status');
      status.className = 'status warning';
      status.textContent = 'Add-in not configured. Please reinstall using the URL provided by your IT administrator.';
    } else {
      document.getElementById('reportBtn').disabled = false;
    }
  }
});

function reportPhishing() {
  var btn = document.getElementById('reportBtn');
  var status = document.getElementById('status');
  var key = getKey();

  if (!key) {
    status.className = 'status error';
    status.textContent = 'Configuration error: missing report key. Please reinstall the add-in.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Submitting...';
  status.className = 'status';
  status.style.display = 'none';

  var item = Office.context.mailbox.item;
  var reporterEmail = '';
  try { reporterEmail = Office.context.mailbox.userProfile.emailAddress; } catch(e) {}

  var bodyFetched = false;
  var submitTimeout = setTimeout(function() {
    if (!bodyFetched) { doSubmit('', item, reporterEmail, key, btn, status); }
  }, 3000);

  try {
    item.body.getAsync(Office.CoercionType.Text, function(result) {
      bodyFetched = true;
      clearTimeout(submitTimeout);
      var bodyPreview = (result && result.value) ? result.value.substring(0, 500) : '';
      doSubmit(bodyPreview, item, reporterEmail, key, btn, status);
    });
  } catch(e) {
    bodyFetched = true;
    clearTimeout(submitTimeout);
    doSubmit('', item, reporterEmail, key, btn, status);
  }
}

function doSubmit(bodyPreview, item, reporterEmail, key, btn, status) {
  var senderEmail = '', senderDomain = '', subject = '', messageId = '';
  var receivedAt = new Date().toISOString();
  try { senderEmail = item.from ? (item.from.emailAddress || '') : ''; } catch(e) {}
  try { senderDomain = senderEmail.indexOf('@') > -1 ? senderEmail.split('@').pop() : ''; } catch(e) {}
  try { subject = item.subject || ''; } catch(e) {}
  try { messageId = item.itemId || ''; } catch(e) {}
  try { if (item.dateTimeCreated) receivedAt = item.dateTimeCreated.toISOString(); } catch(e) {}

  fetch(HELIOS_API + '/api/phish-report/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Phish-Report-Key': key },
    body: JSON.stringify({
      reporter_email: reporterEmail,
      subject: subject,
      sender: senderEmail,
      sender_domain: senderDomain,
      body_preview: bodyPreview,
      message_id: messageId,
      received_at: receivedAt,
      provider: 'outlook'
    })
  })
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(data) {
    try { item.moveToAsync(Office.MailboxEnums.MoveToFolderType.DeletedItems, function() {}); } catch(e) {}
    btn.textContent = 'Reported';
    btn.className = 'btn-report success';
    status.className = 'status success';
    status.textContent = 'Report submitted. Your security team has been notified and the email is under investigation.';
  })
  .catch(function(err) {
    status.className = 'status error';
    status.textContent = 'Submission failed' + (err.message ? ' (' + err.message + ')' : '') + '. Please try again or contact your IT administrator.';
    btn.disabled = false;
    btn.textContent = 'Report as Phishing';
    btn.className = 'btn-report';
  });
}
</script>
</body>
</html>
